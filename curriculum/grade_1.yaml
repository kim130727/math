grade: 1
grade_goal: "숫자는 세상을 보는 언어"

videos:
  - id: "g1_v1"
    title: "숫자는 무엇일까요"
    concept: "수"
    abstraction_stage: "구체 → 개수 추상"
    key_understanding: "물건이 아니라 개수를 본다."
    keywords:
      - "숫자"
      - "개수"
      - "세기"
    example:
      type: "repeated_addition"
      addend: 1
      count: 7
    visual_model: "dots"
    narration_style: "초등 친화적"
    conclusion: "숫자는 물건의 이름이 아니라 개수의 이름입니다."

  - id: "g1_v2"
    title: "더하기는 왜 할까요"
    concept: "덧셈"
    abstraction_stage: "합치기 추상"
    key_understanding: "여러 개를 하나로 볼 수 있다."
    keywords:
      - "더하기"
      - "합치기"
      - "개수"
    example:
      type: "repeated_addition"
      addend: 2
      count: 3
    visual_model: "array"
    narration_style: "초등 친화적"
    conclusion: "더하기는 여러 개를 합쳐서 한 번에 보는 방법입니다."

  - id: "g1_v3"
    title: "빼기는 왜 할까요"
    concept: "뺄셈"
    abstraction_stage: "차이 추상"
    key_understanding: "줄어든 양과 남은 양을 알 수 있다."
    keywords:
      - "빼기"
      - "남은 양"
      - "차이"
    example:
      type: "division_grouping"
      total: 9
      group_size: 3
    visual_model: "grouping"
    narration_style: "초등 친화적"
    conclusion: "빼기는 없어지거나 남은 양을 알아보는 방법입니다."

  - id: "g1_v4"
    title: "수는 어떻게 커질까요"
    concept: "수의 크기"
    abstraction_stage: "순서와 비교"
    key_understanding: "수는 순서와 크기로 비교할 수 있다."
    keywords:
      - "크기 비교"
      - "순서"
      - "수의 크기"
    example:
      type: "pattern_growth"
      pattern: "1, 2, 3, 4, 5"
      rule_text: "수는 하나씩 커지며 순서대로 이어집니다."
    visual_model: "pattern"
    narration_style: "초등 친화적"
    conclusion: "수는 앞뒤 순서와 크기를 가지고 점점 커질 수 있습니다."

  - id: "g1_v5"
    title: "시간과 길이는 왜 숫자일까요"
    concept: "측정"
    abstraction_stage: "측정 추상 시작"
    key_understanding: "보이지 않는 것도 숫자로 비교할 수 있다."
    keywords:
      - "시간"
      - "길이"
      - "측정"
    example:
      type: "measurement"
      subject: "시간과 길이"
    visual_model: "measurement_compare"
    narration_style: "초등 친화적"
    conclusion: "시간과 길이도 숫자로 나타내면 더 정확하게 비교할 수 있습니다."